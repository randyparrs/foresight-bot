name: Foresight Bot

on:
  workflow_dispatch: # triggered externally by cron-job.org every 15 min

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --omit=dev

      - name: Run bot tick
        env:
          BOT_PRIVATE_KEY: ${{ secrets.BOT_PRIVATE_KEY }}
        run: node bot.js --once
